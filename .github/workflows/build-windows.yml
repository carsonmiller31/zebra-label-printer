name: Build Windows installer

# Builds the Windows NSIS installer on a real Windows runner (the reliable way
# to get the .exe without a local Windows PC). Runs on every push/tag and can be
# started manually from the Actions tab.
#
# On a plain push: uploads the installer as a build artifact for testing.
# On a version tag (v*): publishes a GitHub Release with the installer, its
# .blockmap, and latest.yml — the three files electron-updater needs so that
# already-installed copies auto-update to this version.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# Needed for the release step to create releases / upload assets.
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build installer
        # -p never: build only. electron-builder still writes latest.yml
        # (because package.json has a publish config); we upload it ourselves
        # below so no GH_TOKEN is needed at build time.
        run: npm run dist:win

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: zebra-label-printer-windows
          path: release/*.exe

      - name: Publish release with auto-update assets (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
